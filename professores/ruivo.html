<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../style.css">
</head>

<body>

<div class="perfil-container">

  <div class="card-perfil">

    <img src="../img/ruivo.png" class="foto">

    <h2>Guilherme Fabris</h2>
    <h3><span class="cargo">Monitor</span></h3>
    <h4>17 anos</h4>
    <p>Cursando ADS 1º Termo.</p>
    <div> Hobbies: 
        <p>Jogo volley de areia</p>
        <p>Gosto de jogos (jogo vava)</p>
        <p>Meu jogo favorito é TLOU2</p>
    </div>

    <a href="../professores.html" class="btn">Voltar</a>

  </div>

</div>

<script>
window.onload = () => {
  const src = localStorage.getItem("imgSrc");

  if (src) {
    const overlay = document.createElement("div");
    overlay.classList.add("overlay");
    document.body.appendChild(overlay);

    const img = document.createElement("img");
    img.src = src;
    img.classList.add("img-anim", "img-center");

    img.style.width = "100px";
    img.style.height = "100px";

    document.body.appendChild(img);

    setTimeout(() => {
      localStorage.removeItem("imgSrc");
    }, 800);
  }
};
</script>

</body>
</html>
