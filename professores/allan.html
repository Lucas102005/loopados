<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Allan</title>
  <link rel="stylesheet" href="../style.css">
</head>

<body>

<div class="perfil-container">

  <div class="card-perfil">

    <img src="../img/allan.png" class="foto">

    <h2>Allan</h2>
    <span class="cargo">Monitor</span>

    <p>Dev Python focado em prática.</p>

    <a href="../professores.html" class="btn">Voltar</a>

  </div>

</div>

<script>
window.onload = () => {
  const src = localStorage.getItem("imgSrc");

  if (src) {
    const overlay = document.createElement("div");
    overlay.classList.add("overlay");
    document.body.appendChild(overlay);

    const img = document.createElement("img");
    img.src = src;
    img.classList.add("img-anim", "img-center");

    img.style.width = "100px";
    img.style.height = "100px";

    document.body.appendChild(img);

    setTimeout(() => {
      localStorage.removeItem("imgSrc");
    }, 800);
  }
};
</script>

</body>
</html>
